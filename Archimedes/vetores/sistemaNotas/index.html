<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas de Cálculo de notas</title>
</head>
<body>
    <h1>Sistema para cálculo de notas acadêmicas</h1>
    <label for="inNotaMax">Nota máxima:</label>
    <input type="number" name="notaMax" id="inNotaMax">
    <button id="btnRedefinir">Definir nota máxima</button>
    <br><br>
    <label for="inNota">Nota:</label>
    <input type="number" name="nota" id="inNota" disabled>
    <button id="btnRegistrar" disabled>Registrar nota</button>
    <br><br>
    <button id="btnMedia" disabled>Calcular média</button>
    <button id="btnMaiorNota" disabled>Maior nota</button>
    <button id="btnMaioresMedias" disabled>Notas maiores que 60%</button>
    <button id="btnExibir" disabled>Exibir notas</button><br><br>
    <p id="outSaida"></p>
    <script src="script.js"></script>
</body>
</html>
