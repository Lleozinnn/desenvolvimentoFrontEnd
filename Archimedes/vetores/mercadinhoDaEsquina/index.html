<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de vetor 2.0</title>
</head>
<body>
    <h1>Gerência de estoque do Mercadinho da Esquina</h1>
    <label for="inNome">Nome do produto:</label>
    <input type="text" name="elementos" id="inNome"><br>
    <br>
    <label for="inPreco">Preço unitário:</label>
    <input type="number" name="elementos" id="inPreco"><br>
    <br>
    <label for="inQuantidade">Quantidade de vendas:</label>
    <input type="number" name="elementos" id="inQuantidade"><br>
    <br>
    <button id="btnAdicionarProduto">Adicionar Produto</button>
    <button id="btnRelatorio">Relatório</button><br><br>
    <table >
        <thead>
            <tr>
                <td>Nome</td>
                <td>Quantidade</td>
                <td>Preço</td>
                <td>Receita</td>
            </tr>
        </thead>
        <tbody id="outSaida"></tbody>
    </table>
    <script src="script.js"></script>
</body>
</html>
