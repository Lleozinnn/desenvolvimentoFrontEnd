<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentual de trabalhadores</title>
</head>
<body>
    <h1>Cálculo do percentual de trabalhadores por faixa etária</h1>
    <h3>Insira os dados nos campos abaixo e clique no botão calcular</h3>
    <p>
        Jovens:
        <input type="number" id="inJovens">
    </p>
    <p>
        Adultos:
        <input type="number" id="inAdultos">
    </p>
    <p>
        Idosos:
       <input type="number" id="inIdosos"> 
    </p>
    <button id="btCalcular">Calcular</button>
    <p id="output"></p>
    <script src="script.js"></script>
</body>
</html>
