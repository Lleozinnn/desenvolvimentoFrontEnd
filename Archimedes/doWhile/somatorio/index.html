<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somatório</title>
</head>
<body>
    <h1>Calculadora de Somatório</h1>
    
    <label for="inX">Informe um número real (para X)</label>
    <input type="number" name="numero" id="inX"><br>
    <label for="inY">Informe um número positivo maior ou igual a zero (para Y)</label>
    <input type="number" name="numero" id="inY"><br>
    <button id="btCalcular">Calcular</button>
    <h3 id="outResultado"></h3>
    <script src="index.js"></script>
</body>
</html>
