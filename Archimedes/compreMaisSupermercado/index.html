<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadors de desconto</title>
</head>
<body>
    <h1>Calcule o desconto na compra de seus produtos no supermercado</h1>
    <h2>Informe o preço e as unidades para saber o percentual de desconto.</h2>
    <label for="inProduct">Produto:</label>
    <input type="text" id="inProduct">
    <label for="inPrice">Preço:</label>
    <input type="number" id="inPrice">
    <label for="inQuantity">Quantidade:</label>
    <input type="number" id="inQuantity">
    <button id="btResult">Calcular desconto</button>
    <br>
    <div id="outResult"></div>
    <script src="script.js"></script>
</body>
</html>
