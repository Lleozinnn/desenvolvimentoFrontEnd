<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar cadastro</title>
</head>
<body>
    <style>
        input:valid {
            border: 1.5px solid green;
        }
        input:invalid {
            border: 1.5px dashed red;
        }
        input {
            margin-bottom: 10px;
        }
    </style>
    <header>
        <nav>
            <a href="index.html">Início</a>
                <a href="realState.html">Nossos Imóveis</a>
                <a href="contact.html">Contate-nos</a>
                <a href="formulario.html">Crie uma conta</a>
                <a href="login.html">Faça login</a>
        </nav>
    </header>
    <h1>Cadastre-se</h1>
    <h3>Preencha o formulário a seguir e realize seu cadastro em instantes</h3>
    <form action="#">
        <label for="nome">Nome:</label>
        <input id="nome" type="text"placeholder="Digite seu nome" required oninvalid="this.set">
        <br>
        <label for="cpf">CPF:</label>
        <input id="cpf" type="text" placeholder="Digite seu CPF" pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}" required>
        <br>
        <label for="email">E-mail:</label>
        <input id="email" type="email" placeholder="Digite seu E-mail" required>
        <br>
        <label for="telefone">Telefone:</label>
        <input type="tel" placeholder="Digite seu telefone">
        <br>
        <label for="nascimento">Data de nascimento:</label>
        <input type="date" placeholder="Digite seu nascimento">
        <br>
        <label for="senha">Senha:</label>
        <input type="password" placeholder="Crie uma senha forte">
        <br>
        <input type="submit" value="Efetuar Cadastro">
        <a href="login.html">Já tenho a conta Beling</a>
    </form>
</body>
</html>
