<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar cadastro</title>
</head>
<body>
    <style>
        input:valid {
            border: 1.5px solid green;
        }
        input:invalid {
            border: 1.5px dashed red;
        }
        input {
            margin-bottom: 10px;
        }
    </style>
    <header>
        <nav>
            <a href="index.html">Início</a>
                <a href="realState.html">Nossos Imóveis</a>
                <a href="contact.html">Contate-nos</a>
                <a href="formulario.html">Crie uma conta</a>
                <a href="login.html">Faça login</a>
        </nav>
    </header>
    <h1>Cadastre-se</h1>
    <h3>Preencha o formulário a seguir e realize seu cadastro em instantes</h3>
    <form action="#">
        <label for="nome">Nome:</label>
        <input id="nome" type="text"placeholder="Digite seu nome" required oninvalid="this.set">
        <br>
        <label for="cpf">CPF:</label>
        <input id="cpf" type="text" placeholder="Digite seu CPF" pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}" required>
        <br>
        <label for="email">E-mail:</label>
        <input id="email" type="email" placeholder="Digite seu E-mail" required>
        <br>
        <label for="telefone">Telefone:</label>
        <input id="telefone" type="tel" placeholder="Digite seu telefone" required>
        <br>
        <label for="nascimento">Data de nascimento:</label>
        <input id="nascimento" type="date" placeholder="Digite seu nascimento">
        <br>
        <label for="senha">Senha:</label>
        <input id="senha" type="password" placeholder="Crie uma senha forte">
        <br>
        <label for="genero">Gênero:</label>
         <input type="radio" name="genero" id="masculino" value="Masculino">
        <label for="masculino">Masculino</label>
        <input type="radio" name="genero" id="feminino" value="Feminino">
        <label for="feminino">Feminino</label>
        <br>
        <label for="numSecreto">Numero secreto:</label>
        <select name="numSecreto" id="numSecreto">
            <option value="123">123</option>
            <option value="456">456</option>
            <option value="789">789</option>
            <option value="012">012</option>
            <option value="345">345</option>
        </select>
        <br>
        <label for="termos">Aceite os termos a seguir:</label>
        <br>
        <input type="checkbox" name="termos" id="termo1">
        <label for="termo1">Aceito ter meus dados armazenados durante o uso do serviço</label>
        <br>
        <input type="checkbox" name="termos" id="termo2">
        <label for="termo2">Aceito os termos e condições desse site</label>
        <br>
        <input type="checkbox" name="termos" id="termo3">
        <label for="termo3">Aceito receber comunicações sobre novidades e ofertas</label>
        <br>
        <label for="obs">Observações sobre meu cadastro (caso houver):</label>
        <br>
        <textarea name="obs" id="obs">Sem demais observações</textarea>
        <br>
        <input type="submit" value="Efetuar Cadastro">
        <a href="login.html">Já tenho a conta Beling</a>
    </form>
</body>
</html>
